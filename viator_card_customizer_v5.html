<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Viator Card Customizer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f2f0;--surface:#fff;--surface2:#f6f8f6;
  --border:#dde3dd;--bf:#1a7340;
  --accent:#1a7340;--al:#eaf3ed;
  --text:#111c14;--tm:#5a6e5e;--tf:#9aad9e;
  --r:8px;--rl:12px;
  --sh:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --font:"Inter",system-ui,sans-serif
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;
  display:flex;flex-direction:column;align-items:center;padding:14px;gap:12px}

.header{display:flex;align-items:center;gap:11px;width:100%;max-width:1400px;
  padding:10px 15px;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--rl);box-shadow:var(--sh)}
.vpill{background:#27ae60;color:#fff;font-size:10px;font-weight:800;
  letter-spacing:.12em;text-transform:uppercase;padding:4px 9px;border-radius:20px}
.hdiv{width:1px;height:22px;background:var(--border)}
.htitle{font-size:13px;font-weight:700}
.hsub{font-size:10px;color:var(--tm);margin-top:1px}
.hbadge{margin-left:auto;font-size:10px;color:var(--tm);background:var(--surface2);
  border:1px solid var(--border);padding:3px 9px;border-radius:20px;font-weight:500}

.tabs{display:flex;width:100%;max-width:1400px;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;box-shadow:var(--sh)}
.tab{flex:1;cursor:pointer;padding:10px 15px;display:flex;align-items:center;gap:9px;
  border-right:1px solid var(--border);transition:background .15s;user-select:none}
.tab:last-child{border-right:none}
.tab:hover,.tab.on{background:var(--al)}
.tab.on{border-bottom:3px solid var(--accent)}
.ticon{font-size:18px;line-height:1}
.tname{font-size:12px;font-weight:700}
.tdesc{font-size:10px;color:var(--tm);margin-top:1px}
.tdot{margin-left:auto;width:10px;height:10px;border-radius:50%;border:2px solid var(--border);flex-shrink:0}
.tab.on .tdot{background:var(--accent);border-color:var(--accent)}

.ws{display:grid;grid-template-columns:380px 1fr;gap:12px;width:100%;max-width:1400px;align-items:start}
@media(max-width:900px){.ws{grid-template-columns:1fr}}

.lcol{display:flex;flex-direction:column;gap:10px;position:sticky;top:14px}
@media(max-width:900px){.lcol{position:static}}
.rcol{display:flex;flex-direction:column}

.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);
  overflow:hidden;box-shadow:var(--sh)}
.phead{padding:9px 13px;background:var(--surface2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between}
.ptitle{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em}
.phint{font-size:9px;color:var(--tf)}
.pbody{padding:11px;display:flex;flex-direction:column;gap:9px}

.fg{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.fgh{display:flex;align-items:center;gap:8px;padding:9px 11px;background:var(--surface);
  border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
.fgh:hover{background:#fafcfa}
.fglbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;flex:1}
.fgval{font-size:10px;color:var(--tm);font-family:monospace;max-width:130px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fgarr{font-size:8px;color:var(--tf);transition:transform .2s;margin-left:3px}
.fgarr.open{transform:rotate(180deg)}
.fgb{padding:10px 11px;display:flex;flex-direction:column;gap:8px}
.fgb.hide{display:none}

.flbl{font-size:9px;font-weight:700;color:var(--tm);text-transform:uppercase;
  letter-spacing:.05em;margin-bottom:3px;display:block}
input[type="text"]{font-family:var(--font);font-size:13px;background:var(--surface);
  border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);
  padding:7px 10px;outline:none;transition:border-color .15s;width:100%}
input[type="text"]:focus{border-color:var(--bf)}
input[type="text"]::placeholder{color:var(--tf)}

.btns{display:flex;gap:8px}
button{font-family:var(--font);font-size:11px;font-weight:700;letter-spacing:.05em;
  text-transform:uppercase;padding:9px 16px;border-radius:var(--r);cursor:pointer;
  border:none;transition:all .15s}
button:hover{opacity:.87;transform:translateY(-1px)}
button:active{transform:none}
#breset{background:var(--surface);color:var(--tm);border:1.5px solid var(--border);width:100%}
#status{font-size:10px;color:var(--tm);min-height:12px}

.rpanel{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);
  overflow:hidden;box-shadow:var(--sh)}
.rph{padding:9px 13px;background:var(--surface2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px}
.rptitle{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em}
#bdl{background:var(--accent);color:#fff;margin-left:auto;padding:6px 14px;font-size:10px}
.rpbody{padding:14px;background:#1e1e1e}
canvas#preview{width:100%;display:block;border-radius:var(--r);cursor:default}
canvas#offscreen{display:none}
</style>
</head>
<body>

<div class="header">
  <div class="vpill">Viator</div>
  <div class="hdiv"></div>
  <div><div class="htitle">Card Customizer</div><div class="hsub">Travel Agents &middot; Print Asset Generator</div></div>
  <div class="hbadge">FedEx Print-Ready</div>
</div>

<div class="tabs">
  <div class="tab on" id="tgc" onclick="selTpl('gc')">
    <div class="ticon">&#127873;</div>
    <div><div class="tname">Gift Certificate</div><div class="tdesc">Experience voucher with promo code</div></div>
    <div class="tdot"></div>
  </div>
  <div class="tab" id="tpc" onclick="selTpl('pc')">
    <div class="ticon">&#127991;</div>
    <div><div class="tname">Promo Card</div><div class="tdesc">Discount offer with valid dates</div></div>
    <div class="tdot"></div>
  </div>
</div>

<div class="ws">
  <div class="lcol">
    <div class="panel">
      <div class="phead">
        <span class="ptitle" id="ptitle">Gift Certificate Fields</span>
        <span class="phint">Type to update live</span>
      </div>
      <div class="pbody" id="pbody"></div>
    </div>
    <button id="breset" onclick="doReset()">&#8635; Reset Defaults</button>
    <div id="status"></div>
  </div>

  <div class="rcol">
    <div class="rpanel">
      <div class="rph">
        <span class="rptitle">Preview</span>
        <button id="bdl" onclick="doDownload()">&#8595; Download PNG</button>
      </div>
      <div class="rpbody">
        <canvas id="preview"></canvas>
      </div>
    </div>
  </div>
</div>

<canvas id="offscreen"></canvas>

EAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREB//Z";
// All coordinates are at native 1650x1275 resolution
// GC green box: x=385-1262, y=385-947, center x=824, center y=666

const DEFS = {
  gc: [
    {id:"gn", lbl:"Event Name",    ph:"e.g. Hawaii Cruise 2026", val:""},
    {id:"ga", lbl:"Dollar Amount", ph:"e.g. 100",                val:""},
    {id:"gp", lbl:"Promo Code",    ph:"e.g. ABC123",             val:""},
    {id:"ge", lbl:"Expiry Date",   ph:"e.g. 12/31/2026",         val:""}
  ],
  pc: [
    {id:"pn", lbl:"Event Name",    ph:"e.g. Hawaii Cruise 2026", val:""},
    {id:"pd", lbl:"Discount",      ph:"e.g. 10 for 10% OFF",     val:""},
    {id:"pk", lbl:"Promo Code",    ph:"e.g. SAVE10",             val:""},
    {id:"ps", lbl:"Start Date",    ph:"e.g. 1/1/2026",           val:""},
    {id:"pe", lbl:"End Date",      ph:"e.g. 2/1/2026",           val:""}
  ]
};

const TPLS = {
  gc: {src:GC, w:1650, h:1275, ttl:"Gift Certificate Fields", fn:"viator_gift_card.png"},
  pc: {src:PC, w:1650, h:1275, ttl:"Promo Card Fields",       fn:"viator_promo_card.png"}
};

// Preload images
const IMGS = {};
for (const [k,t] of Object.entries(TPLS)) {
  const i = new Image();
  i.onload = () => draw();
  i.src = t.src;
  IMGS[k] = i;
}

let cfg = JSON.parse(JSON.stringify(DEFS));
let cur = "gc";

function selTpl(k) {
  cur = k;
  ["gc","pc"].forEach(id => document.getElementById("t"+id).classList.toggle("on", id===k));
  document.getElementById("ptitle").textContent = TPLS[k].ttl;
  buildFields(k);
  draw();
}

function buildFields(k) {
  const body = document.getElementById("pbody");
  body.innerHTML = "";
  cfg[k].forEach(f => {
    const d = document.createElement("div");
    d.className = "fg";
    d.innerHTML = `
      <div class="fgh" onclick="tog('${f.id}')">
        <span class="fglbl">${f.lbl}</span>
        <span class="fgval" id="fv${f.id}">${f.val || "(empty)"}</span>
        <span class="fgarr" id="fa${f.id}">&#9660;</span>
      </div>
      <div class="fgb hide" id="fb${f.id}">
        <span class="flbl">Text Value</span>
        <input type="text" id="${f.id}" placeholder="${f.ph}" value="${f.val}"
          oninput="inp('${f.id}','${k}')"/>
      </div>`;
    body.appendChild(d);
  });
}

function tog(id) {
  document.getElementById("fb"+id).classList.toggle("hide");
  document.getElementById("fa"+id).classList.toggle("open");
}

function inp(id, k) {
  const v = document.getElementById(id)?.value || "";
  const f = cfg[k].find(x => x.id === id);
  if (f) f.val = v;
  const el = document.getElementById("fv"+id);
  if (el) el.textContent = v || "(empty)";
  draw();
}

// ─── Drawing ──────────────────────────────────────────────────────────────────

function getVals() {
  const out = {};
  cfg[cur].forEach(f => { out[f.id] = document.getElementById(f.id)?.value?.trim() || ""; });
  return out;
}

function draw() {
  const canvas = document.getElementById("preview");
  const t = TPLS[cur];
  canvas.width = t.w;
  canvas.height = t.h;
  const ctx = canvas.getContext("2d");
  const img = IMGS[cur];
  const v = getVals();

  ctx.clearRect(0, 0, t.w, t.h);
  if (!img.complete || !img.naturalWidth) return;
  ctx.drawImage(img, 0, 0, t.w, t.h);

  if (cur === "gc") drawGC(ctx, v, t.w, t.h);
  else              drawPC(ctx, v, t.w, t.h);
}

function txt(ctx, text, x, y, size, weight, color, align) {
  ctx.save();
  ctx.font = weight + " " + size + "px Inter,sans-serif";
  ctx.fillStyle = color;
  ctx.textBaseline = "alphabetic";
  ctx.textAlign = align || "center";
  ctx.fillText(text, x, y);
  ctx.restore();
}

// Wraps text into lines that fit within maxWidth, returns array of strings
function wrapText(ctx, text, maxWidth) {
  const words = text.split(" ");
  const lines = [];
  let line = "";
  for (const word of words) {
    const test = line ? line + " " + word : word;
    if (ctx.measureText(test).width > maxWidth && line) {
      lines.push(line);
      line = word;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  return lines;
}

function drawTerms(ctx, expiryDate, W, H) {
  const expiry = expiryDate || "[expiry date]";
  const termsText =
    "Terms & Conditions: Valid until " + expiry + ". Experience must be booked on travelagents.viator.com " +
    "or via \u2018Share with Client\u2019 links. Experience must be booked by the redemption date; but, travel can occur " +
    "in the future. User is responsible for paying a $1 processing fee. Commission will be earned on booking. " +
    "Some restrictions apply.";

  const fontSize = 19;
  const lineHeight = 28;
  const padL = 385;
  const padR = 1262;
  const maxWidth = padR - padL;
  const startY = 985; // ~38px below green box bottom (947)

  ctx.save();
  ctx.font = "400 " + fontSize + "px Inter,sans-serif";
  ctx.fillStyle = "rgba(255,255,255,0.80)";
  ctx.textBaseline = "alphabetic";
  ctx.textAlign = "left";

  const lines = wrapText(ctx, termsText, maxWidth);
  lines.forEach((line, i) => {
    ctx.fillText(line, padL, startY + i * lineHeight);
  });
  ctx.restore();
}

function drawGC(ctx, v, W, H) {
  // Green box: x=385-1262 (cx=824), y=385-947
  const cx = 824;
  const boxL = 385, boxR = 1262, boxT = 385, boxB = 947;
  const pad = 55;

  // "VIATOR EXPERIENCE VOUCHER" — small allcaps label near top of box
  txt(ctx, "VIATOR EXPERIENCE VOUCHER", cx, boxT+70, 28, "700", "rgba(255,255,255,0.75)", "center");

  // Divider line
  ctx.save();
  ctx.strokeStyle = "rgba(255,255,255,0.3)";
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(boxL+pad, boxT+88);
  ctx.lineTo(boxR-pad, boxT+88);
  ctx.stroke();
  ctx.restore();

  // "GIFT CERTIFICATE"
  txt(ctx, "GIFT CERTIFICATE", cx, boxT+148, 64, "800", "#ffffff", "center");

  // Event name (auto-scales to fit green box)
  const eventName = v.gn ? v.gn.trim() : "";
  if (eventName) {
    let eventSize = 56;
    ctx.font = "700 " + eventSize + "px Inter,sans-serif";
    while (ctx.measureText(eventName).width > (boxR - boxL - pad * 2) && eventSize > 34) {
      eventSize -= 2;
      ctx.font = "700 " + eventSize + "px Inter,sans-serif";
    }
    txt(ctx, eventName, cx, boxT + 225, eventSize, "700", "rgba(255,255,255,0.95)", "center");
  }

  // Dollar amount — big centered
  const amt = v.ga ? "$" + v.ga : "";
  if (amt) {
    txt(ctx, amt, cx, boxT+350, 200, "900", "#ffffff", "center");
  } else {
    // placeholder ghost
    txt(ctx, "$", cx, boxT+350, 200, "900", "rgba(255,255,255,0.15)", "center");
  }

  // Promo code section
  const promoY = boxB - 155;
  txt(ctx, "PROMO CODE", cx, promoY, 22, "600", "rgba(255,255,255,0.65)", "center");

  // Promo code value
  if (v.gp) {
    txt(ctx, v.gp.toUpperCase(), cx, promoY+52, 46, "800", "#ffffff", "center");
  } else {
    txt(ctx, "──────────", cx, promoY+46, 36, "400", "rgba(255,255,255,0.2)", "center");
  }

  // Divider line above expiry
  ctx.save();
  ctx.strokeStyle = "rgba(255,255,255,0.25)";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(boxL+pad, boxB-78);
  ctx.lineTo(boxR-pad, boxB-78);
  ctx.stroke();
  ctx.restore();

  // Expiry date
  const expLabel = "Valid through:";
  const expValue = v.ge || "──────────";
  const expColor = v.ge ? "#ffffff" : "rgba(255,255,255,0.25)";
  ctx.save();
  ctx.font = "500 24px Inter,sans-serif";
  ctx.fillStyle = "rgba(255,255,255,0.65)";
  ctx.textBaseline = "alphabetic";
  ctx.textAlign = "left";
  ctx.fillText(expLabel, boxL+pad, boxB-44);
  ctx.font = "700 26px Inter,sans-serif";
  ctx.fillStyle = expColor;
  ctx.textAlign = "right";
  ctx.fillText(expValue, boxR-pad, boxB-44);
  ctx.restore();

  // Terms & Conditions below the green box
  drawTerms(ctx, v.ge, W, H);
}

function drawPC(ctx, v, W, H) {
  const cx = W / 2;

  // Event name headline at top
  const eventName = v.pn ? v.pn.trim() : "";
  if (eventName) {
    let eventSize = 74;
    ctx.font = "800 " + eventSize + "px Inter,sans-serif";
    while (ctx.measureText(eventName).width > W - 150 && eventSize > 42) {
      eventSize -= 2;
      ctx.font = "800 " + eventSize + "px Inter,sans-serif";
    }
    txt(ctx, eventName.toUpperCase(), cx, 175, eventSize, "800", "#ffffff", "center");
  }

  // Auto-format discount: "10" → "10% OFF", "10% OFF" → "10% OFF"
  const rawDisc = v.pd ? v.pd.trim() : "";
  const discFormatted = rawDisc
    ? (/^\d+(\.\d+)?$/.test(rawDisc) ? rawDisc + "% OFF" : rawDisc.toUpperCase())
    : "10% OFF";
  const discount = discFormatted;
  const discColor = v.pd ? "#FFD700" : "rgba(255,215,0,0.18)";

  // Auto-scale font to fit width
  let discSize = 260;
  ctx.font = "900 " + discSize + "px Inter,sans-serif";
  while (ctx.measureText(discount).width > W - 100 && discSize > 80) {
    discSize -= 4;
    ctx.font = "900 " + discSize + "px Inter,sans-serif";
  }
  txt(ctx, discount, cx, 490, discSize, "900", discColor, "center");

  // ── Bottom section (below photos, y≈1000+) ──
  const botY = 1035;

  // "Apply code CODE at: travelagents.viator.com" — single centered line
  const codeStr = v.pk ? v.pk : "promocode";
  const applyLine = "Apply code " + codeStr + " at: travelagents.viator.com";
  txt(ctx, applyLine, cx, botY, 44, "700", "#ffffff", "center");

  // Date terms line
  const s = v.ps || "(date)";
  const e = v.pe || "(date)";
  const dateLine = "Offer valid for bookings made between " + s + " and " + e + " 11:59PM ET on travelagents.viator.com";
  txt(ctx, dateLine, cx, botY + 58, 24, "400", "rgba(255,255,255,0.85)", "center");

  // "Some product exclusions apply."
  txt(ctx, "Some product exclusions apply.", cx, botY + 97, 24, "400", "rgba(255,255,255,0.85)", "center");
}

// ─── Download ─────────────────────────────────────────────────────────────────

async function doDownload() {
  await document.fonts.ready;
  const os = document.getElementById("offscreen");
  const t = TPLS[cur];
  os.width = t.w;
  os.height = t.h;
  const ctx = os.getContext("2d");
  const img = IMGS[cur];
  ctx.drawImage(img, 0, 0, t.w, t.h);
  const v = getVals();
  if (cur === "gc") drawGC(ctx, v, t.w, t.h);
  else              drawPC(ctx, v, t.w, t.h);

  // Build filename: "Viator Gift Card - [event] - [code]" or "Viator Promo Card - [event] - [code]"
  const cardType = cur === "gc" ? "Viator Gift Card" : "Viator Promo Card";
  const eventName = (cur === "gc" ? v.gn : v.pn) || "Event";
  const promoCode = (cur === "gc" ? v.gp : v.pk) || "Code";
  const safeName = (s) => s.replace(/[^a-zA-Z0-9 \-_]/g, "").trim();
  const filename = safeName(cardType + " - " + eventName + " - " + promoCode) + ".png";

  os.toBlob(b => {
    const a = Object.assign(document.createElement("a"), {href:URL.createObjectURL(b), download:filename});
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
    setS("Downloaded: " + filename);
  }, "image/png");
}

function doReset() {
  cfg = JSON.parse(JSON.stringify(DEFS));
  buildFields(cur);
  draw();
  setS("Reset to defaults.");
}

function setS(m) { document.getElementById("status").textContent = m; }
window.addEventListener("resize", draw);

// Init
buildFields("gc");
draw();

</script>
